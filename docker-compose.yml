services:
  gpu-service-manager:
    build: .
    container_name: gpu-service-manager
    environment:
      GPU_SERVICE_CONFIG_YAML: |
        services:
          - name: dummy-ok
            path: ${REPO_ROOT}/tests/fixtures/services/dummy-ok/docker-compose.yml
          - ${REPO_ROOT}/tests/fixtures/services/dummy-alt/compose.yaml
    image: gpu-service-manager:latest
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ${REPO_ROOT}:${REPO_ROOT}
      - ${GPU_HOST_RUNTIME_DIR}:/runtime
      - /var/run/docker.sock:/var/run/docker.sock
