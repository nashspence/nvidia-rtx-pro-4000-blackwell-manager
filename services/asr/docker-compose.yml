services:
  asr:
    image: nvcr.io/nim/nvidia/parakeet-0.6b-tdt:latest
    container_name: asr
    runtime: nvidia
    restart: unless-stopped
    shm_size: 8gb
    ports:
      - "9000:9000"
      - "50051:50051"
    environment:
      NGC_API_KEY: ${NGC_API_KEY}
      NIM_HTTP_API_PORT: "9000"
      NIM_GRPC_API_PORT: "50051"
      NIM_TAGS_SELECTOR: "type=multi"
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - ${GPU_HOST_ROOT}/cache/nim:/opt/nim/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/v1/health/ready | grep -q '\"status\":\"ready\"'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 45m
  asr-api:
    labels:
      gpu.healthcheck-master: "true"
    build: ./api
    image: asr-api:latest
    container_name: asr-api
    restart: unless-stopped
    depends_on:
      asr:
        condition: service_healthy
    environment:
      RIVA_GRPC_URI: asr:50051
      NIM_READY_URL: http://asr:9000/v1/health/ready
      DEFAULT_LANGUAGE: multi
      LOG_LEVEL: INFO
      MAX_UPLOAD_MB: 512
      GRPC_MAX_MB: 512
    ports:
      - "8000:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready | grep -q '\"status\":\"ready\"'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s